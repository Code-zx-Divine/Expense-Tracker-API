services:
  - type: web
    name: expense-tracker-api
    env: node
    plan: free
    buildCommand: npm ci --only=production
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGO_URI
        fromDatabase:
          name: expense-tracker-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://your-frontend.com
      - key: RAPIDAPI_ENABLED
        value: "true"
      - key: ADMIN_SECRET
        generateValue: true
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: REQUEST_TIMEOUT
        value: 30000
      - key: LOG_LEVEL
        value: info

databases:
  - name: expense-tracker-db
    type: mongodb
    plan: free
